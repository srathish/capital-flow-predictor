[project]
name = "cfp-agents"
version = "0.1.0"
description = "Multi-agent ensemble: analysts -> bull/bear researcher debate -> trader -> risk -> portfolio manager"
requires-python = ">=3.11,<3.13"
dependencies = [
    "pandas>=2.2",
    "numpy>=1.26",
    "pydantic>=2.9",
    "langgraph>=0.2",
    "anthropic>=0.40",
    "openai>=1.40",  # OpenAI-compatible providers (Moonshot/Kimi, etc.)
]

[project.optional-dependencies]
dev = ["pytest>=8.3"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cfp_agents"]

[tool.pytest.ini_options]
testpaths = ["tests"]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::FutureWarning",
]
