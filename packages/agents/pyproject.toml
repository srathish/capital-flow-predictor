[project]
name = "cfp-agents"
version = "0.1.0"
description = "Multi-agent ensemble: analysts -> bull/bear researcher debate -> trader -> risk -> portfolio manager"
requires-python = ">=3.11,<3.13"
dependencies = [
    "pandas>=2.2",
    "numpy>=1.26",
    "pydantic>=2.9",
    "langgraph>=0.2",
    "anthropic>=0.40",
    "openai>=1.40",  # OpenAI-compatible providers (Moonshot/Kimi, etc.)
    "langfuse>=3.0",  # observability — no-op without LANGFUSE_PUBLIC_KEY env var
    "cfp-shared",
    "cfp-models",  # position sizing math + Monte Carlo lives here
]

[tool.uv.sources]
cfp-shared = { workspace = true }
cfp-models = { workspace = true }

[project.optional-dependencies]
dev = ["pytest>=8.3"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cfp_agents"]

[tool.pytest.ini_options]
testpaths = ["tests"]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::FutureWarning",
]
