[project]
name = "cfp-shared"
version = "0.1.0"
description = "Shared Pydantic schemas, types, and universe definitions"
requires-python = ">=3.11,<3.13"
dependencies = ["pydantic>=2.9"]

[project.optional-dependencies]
dev = ["pytest>=8.3"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cfp_shared"]

[tool.pytest.ini_options]
testpaths = ["tests"]
