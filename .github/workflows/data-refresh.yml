name: Data refresh

# Scheduled refresh of the live data layer the agents reason from. Each job
# runs `cfp-jobs <subcommand>` against the production DB. They write to the
# same tables the API reads, so freshness here directly drives evidence
# bundle quality on every ensemble run.
#
# Required repo secrets:
#   DATABASE_URL          — production Postgres connection string (Railway)
#   FMP_API_KEY           — used by `flow-universe` if the universe needs sector lookups
#   UNUSUALWHALES_API_KEY — used by `flow-universe`
#
# Optional secrets (langfuse traces from cron runs):
#   LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY, LANGFUSE_HOST
#
# All jobs can also be triggered manually via the Actions tab
# (workflow_dispatch).

on:
  schedule:
    # Every 15 minutes — Reddit RSS catalyst feed (live partnership/leak/FDA chatter)
    - cron: "*/15 * * * *"
    # Every 10 minutes during US RTH (13:30-20:00 UTC, Mon-Fri) — market-tide ticks
    - cron: "*/10 13-20 * * 1-5"
    # Every 12 minutes during US RTH — whale-conviction scorer (re-derives from current data)
    - cron: "2,14,26,38,50 13-20 * * 1-5"
    # Every 30 min during US RTH (13:00-20:00 UTC, Mon-Fri) — UW flow-universe
    # ingest. Hourly was too coarse: the /flow feed routinely showed alerts
    # 60+ min old, plus GH Actions' top-of-hour delay can push that to 90 min.
    - cron: "0,30 13-20 * * 1-5"
    # Daily at 23:30 UTC (after US close) — snapshot per-ticker IV regime
    - cron: "30 23 * * 1-5"
    # Hourly at :07 — Apewisdom mention snapshots (asymmetry flags need 3+ days to mean anything)
    - cron: "7 * * * *"
    # Daily at 06:00 UTC — agent forward-return evaluation (computes 5/10/20/60d returns vs SPY)
    - cron: "0 6 * * *"
    # Daily at 06:30 UTC — rebuild features (after eval-agents updates with prior day prices)
    - cron: "30 6 * * *"
    # Daily at 07:30 UTC — train + emit Reddit-features ML predictions
    - cron: "30 7 * * *"
    # 09:00 ET (= 13:00 UTC) weekdays — pre-market brief.
    - cron: "0 13 * * 1-5"
    # 06:00 ET (= 10:00 UTC) weekdays — catalyst-triggered ensemble re-runs.
    - cron: "0 10 * * 1-5"
    # Every 10 min during RTH, offset 5 min from market-tide to avoid collision.
    # Skylit GEX structure snapshots for SPY/QQQ/SPX persisted to Postgres.
    - cron: "5,15,25,35,45,55 13-20 * * 1-5"
    # 22:30 ET (= 03:30 UTC next day) Tue-Sat — score the day's brief/monitor
    # plan calls against actual SPY/QQQ/SPXW intraday tape. Runs after 1-min
    # bars settle on yfinance. Re-runs any pending plans from the last 7 days.
    - cron: "30 3 * * 2-6"
    # Explosive options tab pipeline (Mon-Fri RTH):
    #   ingest+score at :03, :18, :33, :48 — chained in one job so GH Actions
    #     can't drop the score half by deduping the :07/:22/:37/:52 cron
    #     against other schedules landing on the same minute (see the job def)
    #   drilldown at :12 once an hour — per-contract history + correlations
    - cron: "3,18,33,48 13-20 * * 1-5"
    - cron: "12 14-20 * * 1-5"
    # Daily 22:00 UTC (~18:00 ET, after US close + yfinance settle) — refresh
    # prices_daily + macro_daily across the full universe (sector ETFs +
    # thematic ETFs + benchmarks + cross-asset + cohort members). This is
    # what powers the sector heatmap and the Cohorts tab; without it the
    # data ages a day at a time.
    - cron: "0 22 * * *"
    # Delphi (market-foresight tab) — runs on top of the UW funnel:
    #   uw-screeners-ingest reuses the explosive-ingest :03/:18/:33/:48 slot
    #     (different UW endpoints — stock screener vs contract screener —
    #     so no rate-limit collision).
    #   delphi-rank uses :07/:22/:37/:52, 4 min after the screener writes,
    #     same offset pattern as explosive-score.
    #   uw-gex-ingest runs hourly at :05 during RTH — populates the GEX
    #     walls table (uw_greek_exposure_strike) Delphi reads for
    #     GEX_WALL_ABOVE / GEX_WALL_BELOW reason codes.
    #   delphi-evaluate runs daily at 23:00 UTC, after the 22:00 prices_daily
    #     refresh so it can score closed horizons against the freshest bars.
    - cron: "5 13-20 * * 1-5"
    - cron: "0 23 * * 1-5"
    # delphi-learn rolls up outcomes -> reason_code / calibration / adaptive
    # weight / ticker_memory / model_performance tables. Runs 30 min after
    # delphi-evaluate so the freshest outcomes are in. Idempotent + sample-
    # size-gated so it's safe even before the first horizons close.
    - cron: "30 23 * * 1-5"
    # Dedicated 9:31 AM ET (13:31 UTC) Mon-Fri — guaranteed Delphi morning
    # batch. Chains uw-screeners-ingest -> uw-gex-ingest -> delphi-rank in
    # one job so the 9:31 ET batch lands even when GH Actions drops the
    # interval crons. This is the "you should always have fresh predictions
    # at market open" slot.
    - cron: "31 13 * * 1-5"
    # delphi-ml-train (Layer 4) — dual-head LightGBM with overfitting
    # tripwire. Trains when outcomes_total >= 200. Logs runway nightly.
    - cron: "45 23 * * 1-5"
    # Delphi v0.2 expansion:
    #   delphi-features composes ~120 features per ticker (RTH, 4 min after
    #     uw-screeners-ingest so screener_stocks is fresh)
    #   delphi-rank-v2 reads features and writes v0.2 predictions (RTH,
    #     4 min after delphi-features so the composed row is fresh)
    #   delphi-regime tags today's composite regime (daily, after prices)
    #   uw-predictions polls UW prediction endpoints (RTH)
    - cron: "9,24,39,54 13-20 * * 1-5"   # delphi-features
    - cron: "11,26,41,56 13-20 * * 1-5"  # delphi-rank-v2
    - cron: "15 22 * * *"                # delphi-regime (after prices_daily)
    - cron: "8,38 13-20 * * 1-5"         # uw-predictions
  workflow_dispatch:
    inputs:
      job:
        description: "Which job to run"
        required: false
        default: "reddit-catalysts"
        type: choice
        options:
          - reddit-catalysts
          - reddit
          - reddit-predict
          - reddit-backfill-outcomes
          - eval-agents
          - features-build
          - market-tide
          - whale-conviction
          - flow-universe
          - flow-volatility
          - morning-brief
          - ensemble-rerun-stale
          - gex-snapshot
          - score-gex-plans
          - explosive-ingest
          - explosive-score
          - explosive-drilldown
          - prices-daily
          - prices-backfill
          - uw-screeners-ingest
          - uw-gex-ingest
          - delphi-rank
          - delphi-rank-v2
          - delphi-evaluate
          - delphi-learn
          - delphi-ml-train
          - delphi-morning
          - delphi-features
          - delphi-regime
          - uw-predictions
          - delphi-replay
          - delphi-options-suggest
          - delphi-evaluate-intraday
      backfill_days:
        description: "delphi-regime: backfill this many past days (0 = today only)"
        required: false
        default: "0"
        type: string

jobs:
  reddit-catalysts:
    # Triggered on the */15 schedule, OR manual dispatch with that input
    if: github.event.schedule == '*/15 * * * *' || github.event.inputs.job == 'reddit-catalysts'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Pull Reddit RSS catalyst posts
        working-directory: apps/jobs
        run: uv run cfp-jobs reddit-catalysts

  reddit-mentions:
    if: github.event.schedule == '7 * * * *' || github.event.inputs.job == 'reddit'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Snapshot Apewisdom mention rankings
        working-directory: apps/jobs
        run: uv run cfp-jobs reddit

  reddit-predict:
    # Daily 20d-forward-return predictor. Skips training and writes
    # nothing until enough history accumulates (status='calibrating').
    if: github.event.schedule == '30 7 * * *' || github.event.inputs.job == 'reddit-predict'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Run migrations (ensures reddit_predictions table exists)
        working-directory: apps/jobs
        run: uv run cfp-jobs migrate
      - name: Train + predict 20d forward returns from Reddit features
        working-directory: apps/jobs
        run: uv run cfp-jobs reddit-predict
      - name: Backfill realized 20d/5d returns on matured predictions + posts
        working-directory: apps/jobs
        run: uv run cfp-jobs reddit-backfill-outcomes

  reddit-backfill-outcomes:
    # Manual-only knob for forcing an outcome backfill (e.g. right after a
    # price-data fix, without waiting for the next reddit-predict run).
    if: github.event.inputs.job == 'reddit-backfill-outcomes'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Apply pending migrations
        working-directory: apps/jobs
        run: uv run cfp-jobs migrate
      - name: Backfill realized returns
        working-directory: apps/jobs
        run: uv run cfp-jobs reddit-backfill-outcomes

  eval-agents:
    # Daily forward-return evaluation. Forward returns require >=5 trading
    # days of price history past the agent_signal row, so this is meaningful
    # once we have a week+ of accumulated runs.
    if: github.event.schedule == '0 6 * * *' || github.event.inputs.job == 'eval-agents'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Compute forward returns for matured agent signals
        working-directory: apps/jobs
        run: uv run cfp-jobs eval-agents

  morning-brief:
    # Pre-market brief — 09:00 ET (13:00 UTC) weekdays. Posts rank movers,
    # watchlist deltas, stale-table warnings, and today/tomorrow earnings
    # to MORNING_BRIEF_WEBHOOK_URL (Discord-compatible). No webhook = no-op.
    if: github.event.schedule == '0 13 * * 1-5' || github.event.inputs.job == 'morning-brief'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      MORNING_BRIEF_WEBHOOK_URL: ${{ secrets.MORNING_BRIEF_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Build + post pre-market brief
        working-directory: apps/jobs
        run: uv run cfp-jobs morning-brief

  ensemble-rerun-stale:
    # Catalyst-triggered ensemble re-runs. Picks tickers from custom watchlists +
    # big flow + insider buys + earnings tomorrow + stale PM signals. Cap of
    # 30 per run keeps Anthropic spend bounded (~$4.50/day Sonnet, ~$0.50 Kimi).
    # Runs 06:00 ET (10:00 UTC) weekdays so the screener is fresh at market open.
    if: github.event.schedule == '0 10 * * 1-5' || github.event.inputs.job == 'ensemble-rerun-stale'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      UNUSUAL_WHALES_API_KEY: ${{ secrets.UNUSUAL_WHALES_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
      LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Re-run ensemble on stale + catalyst-flagged tickers
        working-directory: apps/jobs
        run: uv run cfp-jobs ensemble-rerun-stale --max-tickers 30

  gex-snapshot:
    # Skylit / Heatseeker GEX structure for SPY/QQQ/SPX persisted to Postgres
    # every 10 min during RTH. The Python skylit_bridge reads the latest row
    # per ticker (15-min freshness window) — no Node runtime in the API
    # container. Auth lives in the skylit_credentials table on Postgres so
    # this job only needs DATABASE_URL to reach the credentials + write
    # results.
    if: startsWith(github.event.schedule, '5,15,25,35,45,55') || github.event.inputs.job == 'gex-snapshot'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      # Optional fallbacks if Postgres skylit_credentials is empty (cold
      # cluster) — local-dev style auth via env vars.
      CLERK_SESSION_ID: ${{ secrets.CLERK_SESSION_ID }}
      CLERK_CLIENT_COOKIE: ${{ secrets.CLERK_CLIENT_COOKIE }}
      HEATSEEKER_JWT: ${{ secrets.HEATSEEKER_JWT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install apps/gex deps
        # npm install (not ci) — apps/gex has no committed package-lock.json
        # and only 4 runtime deps. --omit=dev skips test/lint extras.
        working-directory: apps/gex
        run: npm install --omit=dev --no-audit --no-fund
      - name: Fetch + persist SPY/QQQ/SPXW structure snapshots
        working-directory: apps/gex
        # apps/gex scripts use `--flag=value` (equals); space-separated form
        # gets parsed as `--tickers=true` by the regex parser in the script.
        # SPXW (not SPX): Heatseeker streams the weekly-options symbol which
        # carries the real dealer GEX positioning. The cash SPX index isn't
        # on Skylit's tape. The determined-quietude env uses SPXW too.
        run: node scripts/persist-snapshots.js --tickers=SPY,QQQ,SPXW

  score-gex-plans:
    # Nightly self-grading of brief / monitor CALLS / PUTS plans. Parses
    # gex_feed, fetches yfinance 1-min bars for SPY/QQQ/^GSPC, determines
    # whether the break level was crossed and whether target hit before stop,
    # then upserts gex_plan_outcomes. Powers the /gex/accuracy tab.
    if: github.event.schedule == '30 3 * * 2-6' || github.event.inputs.job == 'score-gex-plans'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Apply migrations (gex_plan_outcomes idempotent)
        working-directory: apps/jobs
        run: uv run cfp-jobs migrate
      - name: Score the last 7 days of plans against intraday tape
        working-directory: apps/jobs
        run: uv run cfp-jobs score-gex-plans --days 7

  features-build:
    # Daily feature rebuild. Reads prices_daily + macro_daily, writes the
    # full feature panel (cross-asset + sector v1 + alpha158) to features_daily.
    # Picks up the new Alpha158 columns automatically since the storage is JSONB.
    if: github.event.schedule == '30 6 * * *' || github.event.inputs.job == 'features-build'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Rebuild full daily feature panel (cross-asset + sector + alpha158)
        working-directory: apps/jobs
        run: uv run cfp-jobs features-daily

  market-tide:
    # Intraday tape direction. UW returns ~1-min buckets for the current
    # session; we upsert so re-running inside the same minute is idempotent.
    # Drives the Whale Conviction scorer's "with-tape vs against-tape" pill.
    if: github.event.schedule == '*/10 13-20 * * 1-5' || github.event.inputs.job == 'market-tide'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      UNUSUAL_WHALES_API_KEY: ${{ secrets.UNUSUAL_WHALES_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Ensure migrations applied
        working-directory: apps/jobs
        run: uv run cfp-jobs migrate
      - name: Pull market-tide ticks
        working-directory: apps/jobs
        run: uv run cfp-jobs market-tide

  whale-conviction:
    # Heuristic 0..100 score per (ticker, window) from the latest flow + dark
    # pool + insider + congress + IV regime + market tide. Reads, doesn't fetch.
    if: startsWith(github.event.schedule, '2,14,26,38,50') || github.event.inputs.job == 'whale-conviction'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Ensure migrations applied
        working-directory: apps/jobs
        run: uv run cfp-jobs migrate
      - name: Re-derive whale conviction signals
        working-directory: apps/jobs
        run: uv run cfp-jobs whale-conviction

  flow-universe:
    # UW per-ticker flow alerts + dark pool + net premium + greeks + insiders.
    # Twice a day during RTH for the top constituents — enough for the /flow
    # page to render and the scorer to have fresh ammunition.
    if: github.event.schedule == '0,30 13-20 * * 1-5' || github.event.inputs.job == 'flow-universe'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      UNUSUAL_WHALES_API_KEY: ${{ secrets.UNUSUAL_WHALES_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Ensure migrations applied
        working-directory: apps/jobs
        run: uv run cfp-jobs migrate
      - name: UW per-ticker flow ingest across the universe
        working-directory: apps/jobs
        run: uv run cfp-jobs flow-universe --max-tickers 80

  flow-volatility:
    # Per-ticker IV regime (iv30, iv_rank, iv_percentile, rv30). Once daily
    # after the US close — IV rank changes slowly enough that more frequent
    # snapshots would just burn UW quota.
    if: github.event.schedule == '30 23 * * 1-5' || github.event.inputs.job == 'flow-volatility'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      UNUSUAL_WHALES_API_KEY: ${{ secrets.UNUSUAL_WHALES_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Ensure migrations applied
        working-directory: apps/jobs
        run: uv run cfp-jobs migrate
      - name: Snapshot IV regime per ticker
        working-directory: apps/jobs
        run: uv run cfp-jobs flow-volatility

  explosive-ingest:
    # Refreshes the explosive-options tab data stack: contract_screener,
    # short_screener, FDA + IPO calendars, top_net_impact, volume_profile
    # for top contracts, and per-ticker flow_per_strike / flow_per_expiry /
    # iv_term / max_pain / FTD / NOPE / skew / RV / insider flow.
    # Then immediately scores in the same job (chained 2026-05-29) so the
    # /explosive snapshot_ts always advances when ingest does. The standalone
    # explosive-score cron used to fire 4 min later, but GH Actions was
    # silently dropping the :07/:22/:37/:52 trigger when other crons collided
    # at the same minute (e.g. the hourly `7 * * * *` reddit-mentions slot)
    # — leaving the API serving a day-old snapshot even when ingest worked.
    # Chaining matches the delphi-morning atomic-batch pattern further down.
    if: startsWith(github.event.schedule, '3,18,33,48') || github.event.inputs.job == 'explosive-ingest'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      UNUSUAL_WHALES_API_KEY: ${{ secrets.UNUSUAL_WHALES_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Ensure migrations applied (0024, 0025, 0026)
        working-directory: apps/jobs
        run: uv run cfp-jobs migrate
      - name: Step 1/2 — ingest explosive-tab universe
        working-directory: apps/jobs
        run: uv run cfp-jobs explosive-ingest --max-tickers 80
      - name: Step 2/2 — compute + persist explosive_scores
        working-directory: apps/jobs
        run: uv run cfp-jobs explosive-score

  explosive-score:
    # Manual-only fallback now. The scheduled run is chained at the end of
    # explosive-ingest above (workflow_dispatch still lets you trigger a
    # score-only refresh when the ingest tables are fresh but the snapshot
    # is stale, e.g. after a deploy that wiped the API cache).
    if: github.event.inputs.job == 'explosive-score'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Ensure migrations applied
        working-directory: apps/jobs
        run: uv run cfp-jobs migrate
      - name: Compute + persist explosive_scores
        working-directory: apps/jobs
        run: uv run cfp-jobs explosive-score

  prices-daily:
    # Daily prices + macro refresh — the foundation everything sector- and
    # cohort-related reads from. Runs 22:00 UTC (~18:00 ET) after the US
    # close + yfinance settle window. Universe is whatever
    # all_yfinance_symbols() returns: sector ETFs + thematic ETFs + benchmarks
    # + cross-asset + cohort members (deduped).
    if: github.event.schedule == '0 22 * * *' || github.event.inputs.job == 'prices-daily'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Ensure migrations applied
        working-directory: apps/jobs
        run: uv run cfp-jobs migrate
      - name: Incremental prices + macro refresh (last 7 days)
        working-directory: apps/jobs
        run: uv run cfp-jobs daily --lookback-days 7

  prices-backfill:
    # One-off historical backfill — manual trigger only. Use after adding
    # new tickers to the universe (e.g. cohort expansion) or recovering
    # from extended downtime. Pulls 5y per ticker, ~150K rows total.
    if: github.event.inputs.job == 'prices-backfill'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Ensure migrations applied
        working-directory: apps/jobs
        run: uv run cfp-jobs migrate
      - name: Full 5y backfill across universe
        working-directory: apps/jobs
        run: uv run cfp-jobs backfill --years 5

  explosive-drilldown:
    # Backfills per-contract OHLC history + peer correlations for the top
    # scored tickers. Powers the /explosive/{ticker} detail page. Hourly
    # at :12 during RTH (after the :07 score run lands).
    if: startsWith(github.event.schedule, '12 14-20') || github.event.inputs.job == 'explosive-drilldown'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      UNUSUAL_WHALES_API_KEY: ${{ secrets.UNUSUAL_WHALES_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Ensure migrations applied
        working-directory: apps/jobs
        run: uv run cfp-jobs migrate
      - name: Refresh top-contract history + peer correlations
        working-directory: apps/jobs
        run: uv run cfp-jobs explosive-drilldown

  uw-screeners-ingest:
    # Stock-screener + market OI + lit/dark-pool snapshots. This is what
    # keeps uw_screener_stocks.last_price fresh — the price column the
    # Delphi ranker reads. Without this job, Delphi would re-score the same
    # stale prices forever. Shares the :03/:18/:33/:48 RTH slot with
    # explosive-ingest, which hits different UW endpoints so rate-limit
    # collision is not a concern.
    if: startsWith(github.event.schedule, '3,18,33,48') || github.event.inputs.job == 'uw-screeners-ingest'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      UNUSUAL_WHALES_API_KEY: ${{ secrets.UNUSUAL_WHALES_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Ensure migrations applied
        working-directory: apps/jobs
        run: uv run cfp-jobs migrate
      - name: Refresh market-layer UW endpoints (screener_stocks, OI change, dark pool, news)
        working-directory: apps/jobs
        run: uv run cfp-jobs uw-screeners-ingest

  uw-gex-ingest:
    # Per-ticker GEX walls + greek-flow ingest. Populates
    # uw_greek_exposure_strike — the table Delphi reads to detect
    # GEX_WALL_ABOVE / GEX_WALL_BELOW reason codes and to anchor
    # target ranges to gamma magnets. Runs hourly at :05 during RTH so
    # the next delphi-rank (at :07/:22/:37/:52) sees fresh walls.
    # Universe = same explosive watchlist used elsewhere (~50-80 tickers),
    # so the daily UW budget impact is ~7 hours × 80 tickers × 4 calls
    # = ~2.2k calls/day — well inside the standard tier's daily cap.
    if: startsWith(github.event.schedule, '5 13-20') || github.event.inputs.job == 'uw-gex-ingest'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      UNUSUAL_WHALES_API_KEY: ${{ secrets.UNUSUAL_WHALES_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Ensure migrations applied
        working-directory: apps/jobs
        run: uv run cfp-jobs migrate
      - name: Pull per-ticker GEX strike + expiry + flow for the universe
        working-directory: apps/jobs
        run: uv run cfp-jobs uw-gex-ingest

  delphi-rank:
    # Layer-1 rules ranker — reads the freshest uw_screener_stocks snapshot
    # (written 4 min earlier by uw-screeners-ingest) + uw_greek_exposure_strike
    # walls, applies the reachability filter, writes ranked predictions to
    # delphi_predictions. Predictions are frozen — outcomes get filled by
    # delphi-evaluate once horizons close.
    if: startsWith(github.event.schedule, '7,22,37,52') || github.event.inputs.job == 'delphi-rank'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Ensure migrations applied
        working-directory: apps/jobs
        run: uv run cfp-jobs migrate
      - name: Rank candidates + persist Delphi predictions
        working-directory: apps/jobs
        run: uv run cfp-jobs delphi-rank --candidate-limit 50

  delphi-evaluate:
    # Closes the memory loop. For every prediction whose horizon has expired,
    # pulls actual high/low/close from prices_daily and writes delphi_outcomes
    # (win / loss / invalidated / breakeven). Runs daily at 23:00 UTC, an
    # hour after the 22:00 prices_daily refresh so the freshest EOD bars
    # are in. Idempotent — already-scored predictions are skipped.
    if: github.event.schedule == '0 23 * * 1-5' || github.event.inputs.job == 'delphi-evaluate'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Ensure migrations applied
        working-directory: apps/jobs
        run: uv run cfp-jobs migrate
      - name: Score expired predictions against actual price action
        working-directory: apps/jobs
        run: uv run cfp-jobs delphi-evaluate --max-batch 500

  delphi-learn:
    # Layers 2 + 3 + ticker memory + model performance. Reads
    # (delphi_predictions JOIN delphi_outcomes), writes the five learning
    # tables. Sample-size-gated — segments below threshold get neutral
    # weights (1.0) so the ranker (when ungated) reads safe defaults.
    # Runs 30 min after delphi-evaluate so outcomes are fresh.
    if: github.event.schedule == '30 23 * * 1-5' || github.event.inputs.job == 'delphi-learn'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Ensure migrations applied
        working-directory: apps/jobs
        run: uv run cfp-jobs migrate
      - name: Roll up outcomes into Delphi learning tables
        working-directory: apps/jobs
        run: uv run cfp-jobs delphi-learn

  delphi-morning:
    # Guaranteed market-open batch — 9:31 AM ET (13:31 UTC) Mon-Fri.
    # Runs the three Delphi data dependencies sequentially in one job, so
    # the batch lands as a single atomic unit even if GH Actions drops the
    # individual interval crons that fire later in the day.
    if: github.event.schedule == '31 13 * * 1-5' || github.event.inputs.job == 'delphi-morning'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      UNUSUAL_WHALES_API_KEY: ${{ secrets.UNUSUAL_WHALES_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Ensure migrations applied
        working-directory: apps/jobs
        run: uv run cfp-jobs migrate
      - name: Step 1/3 — refresh UW screener_stocks (prices Delphi reads)
        working-directory: apps/jobs
        run: uv run cfp-jobs uw-screeners-ingest
      - name: Step 2/3 — refresh UW GEX walls (reason codes)
        working-directory: apps/jobs
        run: uv run cfp-jobs uw-gex-ingest
      - name: Step 3/3 — rank candidates + persist Delphi predictions
        working-directory: apps/jobs
        run: uv run cfp-jobs delphi-rank --candidate-limit 50

  delphi-ml-train:
    # Layer 4 ML overlay — dual-head LightGBM with overfitting tripwire.
    # Trains when outcomes_total >= DELPHI_ML_MIN_OUTCOMES (default 200).
    # Rejects models whose train/holdout Brier gap > 0.05 (so iteration
    # cannot ship a model that overfits the in-sample distribution).
    if: github.event.schedule == '45 23 * * 1-5' || github.event.inputs.job == 'delphi-ml-train'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Ensure migrations applied
        working-directory: apps/jobs
        run: uv run cfp-jobs migrate
      - name: Layer-4 ML overlay (calibrating until threshold)
        working-directory: apps/jobs
        run: uv run cfp-jobs delphi-ml-train

  delphi-features:
    # Composes ~120 features per ticker into delphi_features. Reads ~20 UW
    # tables + prices_daily + macro_regime. 4 min after uw-screeners-ingest
    # so screener_stocks is fresh. v0.2/v0.3 of Delphi reads from here.
    # NOTE: timeout bumped to 30m (was 15) after 200 tickers ran 15m+;
    # max_tickers lowered to 120 to leave margin for 15-min-grid completion.
    if: startsWith(github.event.schedule, '9,24,39,54') || github.event.inputs.job == 'delphi-features'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Apply migrations (0037_delphi_v2 + 0038_delphi_quant)
        working-directory: apps/jobs
        run: uv run cfp-jobs migrate
      - name: Compose Delphi v0.3 features (thread-pooled, ~10x faster)
        working-directory: apps/jobs
        env:
          DELPHI_COMPOSER_WORKERS: "10"
        run: uv run cfp-jobs delphi-features --max-tickers 150

  delphi-rank-v2:
    # v0.2 ranker — reads delphi_features, emits ~40 reason codes, tags
    # composite_regime, applies conflict dampening, assigns 15% to holdout.
    # 2 min after delphi-features so the composed row is fresh.
    if: startsWith(github.event.schedule, '11,26,41,56') || github.event.inputs.job == 'delphi-rank-v2'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Apply migrations
        working-directory: apps/jobs
        run: uv run cfp-jobs migrate
      - name: Rank v0.2 predictions from delphi_features
        working-directory: apps/jobs
        run: uv run cfp-jobs delphi-rank-v2 --candidate-limit 50
      - name: Suggest options + EV for fresh predictions
        working-directory: apps/jobs
        run: uv run cfp-jobs delphi-options-suggest --hours 2

  delphi-regime:
    # Tags today's composite regime (vol/trend/macro). Stratifies all
    # downstream calibration buckets. Daily 22:15 UTC, 15 min after the
    # 22:00 prices_daily refresh so SPY MAs + VIX/FRED are fresh.
    if: github.event.schedule == '15 22 * * *' || github.event.inputs.job == 'delphi-regime'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Apply migrations
        working-directory: apps/jobs
        run: uv run cfp-jobs migrate
      - name: Tag composite regime
        working-directory: apps/jobs
        env:
          BACKFILL_DAYS: ${{ github.event.inputs.backfill_days || '0' }}
        run: uv run cfp-jobs delphi-regime --backfill-days "$BACKFILL_DAYS"

  uw-predictions:
    # UW prediction endpoints (smart_money, whales, market, insiders,
    # unusual_markets) → uw_predictions_api. Used as ensemble voters in
    # delphi-rank-v2. Twice per hour during RTH.
    if: startsWith(github.event.schedule, '8,38 13-20') || github.event.inputs.job == 'uw-predictions'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      UNUSUAL_WHALES_API_KEY: ${{ secrets.UNUSUAL_WHALES_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Apply migrations
        working-directory: apps/jobs
        run: uv run cfp-jobs migrate
      - name: Pull UW prediction endpoints
        working-directory: apps/jobs
        run: uv run cfp-jobs uw-predictions

  delphi-evaluate-intraday:
    # Phase 5e: resolve hit_invalidation_first touch order using yfinance 5m
    # bars for predictions where both target and invalidation touched the
    # same day. Runs nightly after delphi-evaluate; idempotent.
    if: github.event.inputs.job == 'delphi-evaluate-intraday'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Apply migrations
        working-directory: apps/jobs
        run: uv run cfp-jobs migrate
      - name: Resolve touch-order for ambiguous predictions
        working-directory: apps/jobs
        run: uv run cfp-jobs delphi-evaluate-intraday --max-batch 200

  delphi-options-suggest:
    # Phase 5d: pick a contract + pull mid + compute BS EV for every
    # v0.3 prediction in the last N hours. Manual-only; the rank-v2 job
    # also runs this as a post-step on every scheduled rank.
    # Threaded composer (10 workers default) keeps 300 predictions under
    # 5 minutes.
    if: github.event.inputs.job == 'delphi-options-suggest'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DELPHI_OPTIONS_WORKERS: "10"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Apply migrations (0039_delphi_options)
        working-directory: apps/jobs
        run: uv run cfp-jobs migrate
      - name: Suggest options + EV for fresh predictions
        working-directory: apps/jobs
        run: uv run cfp-jobs delphi-options-suggest --hours 6

  delphi-replay:
    # Walk-forward backtest. Manual only — windows are caller-defined.
    # Default window covers the last 90 days when invoked without inputs.
    if: github.event.inputs.job == 'delphi-replay'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Apply migrations
        working-directory: apps/jobs
        run: uv run cfp-jobs migrate
      - name: Walk-forward replay (last 90d)
        working-directory: apps/jobs
        run: |
          END=$(date -u +%Y-%m-%d)
          START=$(date -u -d '90 days ago' +%Y-%m-%d)
          uv run cfp-jobs delphi-replay --window-start "$START" --window-end "$END"
