name: Data refresh

# Scheduled refresh of the live data layer the agents reason from. Each job
# runs `cfp-jobs <subcommand>` against the production DB. They write to the
# same tables the API reads, so freshness here directly drives evidence
# bundle quality on every ensemble run.
#
# Required repo secrets:
#   DATABASE_URL          — production Postgres connection string (Railway)
#   FMP_API_KEY           — used by `flow-universe` if the universe needs sector lookups
#   UNUSUALWHALES_API_KEY — used by `flow-universe`
#
# Optional secrets (langfuse traces from cron runs):
#   LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY, LANGFUSE_HOST
#
# All jobs can also be triggered manually via the Actions tab
# (workflow_dispatch).

on:
  schedule:
    # Every 15 minutes — Reddit RSS catalyst feed (live partnership/leak/FDA chatter)
    - cron: "*/15 * * * *"
    # Every 10 minutes during US RTH (13:30-20:00 UTC, Mon-Fri) — market-tide ticks
    - cron: "*/10 13-20 * * 1-5"
    # Every 12 minutes during US RTH — whale-conviction scorer (re-derives from current data)
    - cron: "2,14,26,38,50 13-20 * * 1-5"
    # Hourly during US RTH (13:00-20:00 UTC, Mon-Fri) — UW flow-universe ingest
    - cron: "0 13-20 * * 1-5"
    # Daily at 23:30 UTC (after US close) — snapshot per-ticker IV regime
    - cron: "30 23 * * 1-5"
    # Hourly at :07 — Apewisdom mention snapshots (asymmetry flags need 3+ days to mean anything)
    - cron: "7 * * * *"
    # Daily at 06:00 UTC — agent forward-return evaluation (computes 5/10/20/60d returns vs SPY)
    - cron: "0 6 * * *"
    # Daily at 06:30 UTC — rebuild features (after eval-agents updates with prior day prices)
    - cron: "30 6 * * *"
    # Daily at 07:30 UTC — train + emit Reddit-features ML predictions
    - cron: "30 7 * * *"
    # Weekly Sunday 07:00 UTC — retrain XGB ranker on latest features (Alpha158 + originals)
    - cron: "0 7 * * 0"
    # 09:00 ET (= 13:00 UTC) weekdays — pre-market brief.
    - cron: "0 13 * * 1-5"
    # 06:00 ET (= 10:00 UTC) weekdays — catalyst-triggered ensemble re-runs.
    - cron: "0 10 * * 1-5"
  workflow_dispatch:
    inputs:
      job:
        description: "Which job to run"
        required: false
        default: "reddit-catalysts"
        type: choice
        options:
          - reddit-catalysts
          - reddit
          - reddit-predict
          - reddit-backfill-outcomes
          - eval-agents
          - features-build
          - train-baseline
          - market-tide
          - whale-conviction
          - flow-universe
          - flow-volatility
          - morning-brief
          - ensemble-rerun-stale

jobs:
  reddit-catalysts:
    # Triggered on the */15 schedule, OR manual dispatch with that input
    if: github.event.schedule == '*/15 * * * *' || github.event.inputs.job == 'reddit-catalysts'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Pull Reddit RSS catalyst posts
        working-directory: apps/jobs
        run: uv run cfp-jobs reddit-catalysts

  reddit-mentions:
    if: github.event.schedule == '7 * * * *' || github.event.inputs.job == 'reddit'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Snapshot Apewisdom mention rankings
        working-directory: apps/jobs
        run: uv run cfp-jobs reddit

  reddit-predict:
    # Daily 20d-forward-return predictor. Skips training and writes
    # nothing until enough history accumulates (status='calibrating').
    if: github.event.schedule == '30 7 * * *' || github.event.inputs.job == 'reddit-predict'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Run migrations (ensures reddit_predictions table exists)
        working-directory: apps/jobs
        run: uv run cfp-jobs migrate
      - name: Train + predict 20d forward returns from Reddit features
        working-directory: apps/jobs
        run: uv run cfp-jobs reddit-predict
      - name: Backfill realized 20d/5d returns on matured predictions + posts
        working-directory: apps/jobs
        run: uv run cfp-jobs reddit-backfill-outcomes

  reddit-backfill-outcomes:
    # Manual-only knob for forcing an outcome backfill (e.g. right after a
    # price-data fix, without waiting for the next reddit-predict run).
    if: github.event.inputs.job == 'reddit-backfill-outcomes'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Apply pending migrations
        working-directory: apps/jobs
        run: uv run cfp-jobs migrate
      - name: Backfill realized returns
        working-directory: apps/jobs
        run: uv run cfp-jobs reddit-backfill-outcomes

  eval-agents:
    # Daily forward-return evaluation. Forward returns require >=5 trading
    # days of price history past the agent_signal row, so this is meaningful
    # once we have a week+ of accumulated runs.
    if: github.event.schedule == '0 6 * * *' || github.event.inputs.job == 'eval-agents'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Compute forward returns for matured agent signals
        working-directory: apps/jobs
        run: uv run cfp-jobs eval-agents

  morning-brief:
    # Pre-market brief — 09:00 ET (13:00 UTC) weekdays. Posts rank movers,
    # watchlist deltas, stale-table warnings, and today/tomorrow earnings
    # to MORNING_BRIEF_WEBHOOK_URL (Discord-compatible). No webhook = no-op.
    if: github.event.schedule == '0 13 * * 1-5' || github.event.inputs.job == 'morning-brief'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      MORNING_BRIEF_WEBHOOK_URL: ${{ secrets.MORNING_BRIEF_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Build + post pre-market brief
        working-directory: apps/jobs
        run: uv run cfp-jobs morning-brief

  ensemble-rerun-stale:
    # Catalyst-triggered ensemble re-runs. Picks tickers from custom watchlists +
    # big flow + insider buys + earnings tomorrow + stale PM signals. Cap of
    # 30 per run keeps Anthropic spend bounded (~$4.50/day Sonnet, ~$0.50 Kimi).
    # Runs 06:00 ET (10:00 UTC) weekdays so the screener is fresh at market open.
    if: github.event.schedule == '0 10 * * 1-5' || github.event.inputs.job == 'ensemble-rerun-stale'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      UNUSUAL_WHALES_API_KEY: ${{ secrets.UNUSUAL_WHALES_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
      LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Re-run ensemble on stale + catalyst-flagged tickers
        working-directory: apps/jobs
        run: uv run cfp-jobs ensemble-rerun-stale --max-tickers 30

  features-build:
    # Daily feature rebuild. Reads prices_daily + macro_daily, writes the
    # full feature panel (cross-asset + sector v1 + alpha158) to features_daily.
    # Picks up the new Alpha158 columns automatically since the storage is JSONB.
    if: github.event.schedule == '30 6 * * *' || github.event.inputs.job == 'features-build'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Rebuild full daily feature panel (cross-asset + sector + alpha158)
        working-directory: apps/jobs
        run: uv run cfp-jobs features-daily

  train-baseline:
    # Weekly XGB retrain. Walk-forward over the panel built by features-build,
    # writes predictions back to the predictions table. Runs after Sunday's
    # feature rebuild so the model trains on the freshest data.
    if: github.event.schedule == '0 7 * * 0' || github.event.inputs.job == 'train-baseline'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Walk-forward train + persist predictions
        working-directory: apps/jobs
        run: uv run cfp-jobs train-baseline

  market-tide:
    # Intraday tape direction. UW returns ~1-min buckets for the current
    # session; we upsert so re-running inside the same minute is idempotent.
    # Drives the Whale Conviction scorer's "with-tape vs against-tape" pill.
    if: github.event.schedule == '*/10 13-20 * * 1-5' || github.event.inputs.job == 'market-tide'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      UNUSUAL_WHALES_API_KEY: ${{ secrets.UNUSUAL_WHALES_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Ensure migrations applied
        working-directory: apps/jobs
        run: uv run cfp-jobs migrate
      - name: Pull market-tide ticks
        working-directory: apps/jobs
        run: uv run cfp-jobs market-tide

  whale-conviction:
    # Heuristic 0..100 score per (ticker, window) from the latest flow + dark
    # pool + insider + congress + IV regime + market tide. Reads, doesn't fetch.
    if: startsWith(github.event.schedule, '2,14,26,38,50') || github.event.inputs.job == 'whale-conviction'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Ensure migrations applied
        working-directory: apps/jobs
        run: uv run cfp-jobs migrate
      - name: Re-derive whale conviction signals
        working-directory: apps/jobs
        run: uv run cfp-jobs whale-conviction

  flow-universe:
    # UW per-ticker flow alerts + dark pool + net premium + greeks + insiders.
    # Twice a day during RTH for the top constituents — enough for the /flow
    # page to render and the scorer to have fresh ammunition.
    if: github.event.schedule == '0 13-20 * * 1-5' || github.event.inputs.job == 'flow-universe'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      UNUSUAL_WHALES_API_KEY: ${{ secrets.UNUSUAL_WHALES_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Ensure migrations applied
        working-directory: apps/jobs
        run: uv run cfp-jobs migrate
      - name: UW per-ticker flow ingest across the universe
        working-directory: apps/jobs
        run: uv run cfp-jobs flow-universe --max-tickers 80

  flow-volatility:
    # Per-ticker IV regime (iv30, iv_rank, iv_percentile, rv30). Once daily
    # after the US close — IV rank changes slowly enough that more frequent
    # snapshots would just burn UW quota.
    if: github.event.schedule == '30 23 * * 1-5' || github.event.inputs.job == 'flow-volatility'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      UNUSUAL_WHALES_API_KEY: ${{ secrets.UNUSUAL_WHALES_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.11
      - run: uv sync --all-packages
      - name: Ensure migrations applied
        working-directory: apps/jobs
        run: uv run cfp-jobs migrate
      - name: Snapshot IV regime per ticker
        working-directory: apps/jobs
        run: uv run cfp-jobs flow-volatility
