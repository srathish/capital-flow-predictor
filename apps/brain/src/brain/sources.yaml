# Curated source registry. tier: 1 own findings, 2 primary/academic, 3 education, 4 community.
# fetcher: plain (scrapling Fetcher) | stealth (StealthyFetcher) | dynamic | api (search_feeds).
# discovery: seed = crawl once, feed = re-polled by `brain sweep`.
# Dead URLs log a fetch_error and are skipped — the batch never aborts. Growth beyond this
# list happens through `/brain learn` (WebSearch-verified URLs) and the sweep.

