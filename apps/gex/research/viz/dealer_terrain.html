<title>Dealer Terrain — 0DTE Gamma Landscape</title>
<style>
:root{
  --ground:#0a0d14; --ground2:#0e131d; --ink:#e8ecf5; --dim:#8a93a8;
  --faint:#4a5266; --line:#1c2432; --panel:#0f1521; --panel2:#141c2b;
  --amber:#f5b53d; --amber-hi:#ffd77a; --violet:#8b6cf0; --violet-hi:#b49bff;
  --price:#3fe4ff; --price-hot:#ffffff; --pin:#f5b53d; --slide:#8b6cf0;
  --accent:#3fe4ff;
}
:root[data-theme="light"]{
  --ground:#eef1f7; --ground2:#e4e9f2; --ink:#16202f; --dim:#4a556b;
  --faint:#9aa3b8; --line:#d0d8e6; --panel:#f7f9fc; --panel2:#eef2f8;
  --amber:#c8841a; --amber-hi:#e0a238; --violet:#6a4bd0; --violet-hi:#8b6cf0;
  --price:#0090b8; --price-hot:#005a75;
}
@media (prefers-color-scheme:light){
  :root:not([data-theme="dark"]){
    --ground:#eef1f7; --ground2:#e4e9f2; --ink:#16202f; --dim:#4a556b;
    --faint:#9aa3b8; --line:#d0d8e6; --panel:#f7f9fc; --panel2:#eef2f8;
    --amber:#c8841a; --amber-hi:#e0a238; --violet:#6a4bd0; --violet-hi:#8b6cf0;
    --price:#0090b8; --price-hot:#005a75;
  }
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:radial-gradient(120% 90% at 50% 0%,var(--ground2),var(--ground));
  color:var(--ink);
  font-family:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace;
  -webkit-font-smoothing:antialiased;overflow:hidden;
}
.wrap{display:grid;grid-template-rows:auto 1fr auto;height:100vh;gap:0}
header{
  display:flex;align-items:baseline;justify-content:space-between;
  padding:14px 20px 12px;border-bottom:1px solid var(--line);gap:16px;flex-wrap:wrap;
}
.brand{display:flex;flex-direction:column;gap:3px}
.brand h1{
  font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
  font-size:15px;font-weight:650;letter-spacing:.02em;
}
.brand .sub{font-size:11px;color:var(--dim);letter-spacing:.06em;text-transform:uppercase}
.legend{display:flex;gap:16px;align-items:center;font-size:11px;color:var(--dim);flex-wrap:wrap}
.legend .k{display:flex;align-items:center;gap:6px}
.sw{width:22px;height:8px;border-radius:2px}
.stage{position:relative;overflow:hidden}
canvas{display:block;width:100%;height:100%;cursor:grab}
canvas:active{cursor:grabbing}
.readout{
  position:absolute;top:14px;left:16px;background:color-mix(in srgb,var(--panel) 82%,transparent);
  border:1px solid var(--line);border-radius:10px;padding:12px 14px;min-width:186px;
  backdrop-filter:blur(8px);
}
.readout .row{display:flex;justify-content:space-between;gap:18px;font-size:12px;padding:3px 0;font-variant-numeric:tabular-nums}
.readout .row .lbl{color:var(--dim)}
.readout .row .val{font-weight:600}
.regime{margin-top:8px;padding-top:8px;border-top:1px solid var(--line);font-size:11px;letter-spacing:.04em;text-transform:uppercase}
.regime b{font-weight:700}
.hint{position:absolute;bottom:12px;right:16px;font-size:10.5px;color:var(--faint);letter-spacing:.04em;text-align:right;line-height:1.6}
footer{
  display:flex;align-items:center;gap:14px;padding:12px 20px;border-top:1px solid var(--line);
  flex-wrap:wrap;
}
.tabs{display:flex;gap:4px;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:3px}
.tab{
  font-family:inherit;font-size:12px;font-weight:600;color:var(--dim);background:none;border:none;
  padding:6px 13px;border-radius:6px;cursor:pointer;letter-spacing:.03em;transition:all .15s;
}
.tab[aria-selected="true"]{background:var(--panel2);color:var(--ink);box-shadow:inset 0 0 0 1px var(--line)}
.tab:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.scrub{flex:1;display:flex;align-items:center;gap:12px;min-width:220px}
.play{
  font-family:inherit;width:38px;height:38px;border-radius:50%;border:1px solid var(--line);
  background:var(--panel2);color:var(--ink);font-size:14px;cursor:pointer;flex:none;transition:all .15s;
}
.play:hover{border-color:var(--accent);color:var(--accent)}
.play:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
input[type=range]{
  flex:1;-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;
  background:var(--line);cursor:pointer;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--price);
  border:2px solid var(--ground);box-shadow:0 0 8px color-mix(in srgb,var(--price) 60%,transparent);
}
input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--price);border:2px solid var(--ground)}
.clock{font-size:12px;color:var(--dim);font-variant-numeric:tabular-nums;min-width:104px;text-align:right}
.toggles{display:flex;gap:4px;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:3px}
@media (max-width:680px){
  .legend{display:none}
  .readout{min-width:150px;font-size:11px}
  header{padding:12px 14px 10px}
}
</style>

  </footer>
</div>

const cv = document.getElementById('c'), ctx = cv.getContext('2d');
let tk='SPY', surf='gamma', frame=51, playing=false, yaw=-0.62, pitch=0.92, zoom=1;
let W=0,H=0,DPR=1;

function css(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim()}
function resize(){
  DPR=Math.min(2,window.devicePixelRatio||1);
  const r=cv.parentElement.getBoundingClientRect();
  W=r.width;H=r.height;cv.width=W*DPR;cv.height=H*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize',()=>{resize();draw()});

// signed height normalization per ticker/surface
function norm(){
  const d=DATA[tk], grid=d[surf];
  let m=1;
  for(const row of grid) for(const v of row) m=Math.max(m,Math.abs(v));
  return m;
}

// 3D projection: grid (ti=time col, si=strike row) -> screen
function project(gx,gy,gz){
  // gx along time [-1,1], gz along strike [-1,1], gy height
  const cy=Math.cos(yaw),sy=Math.sin(yaw),cp=Math.cos(pitch),sp=Math.sin(pitch);
  let x=gx*cy - gz*sy;
  let z=gx*sy + gz*cy;
  let y=gy;
  const y2=y*cp - z*sp;
  const z2=y*sp + z*cp;
  const scale=Math.min(W,H)*0.46*zoom;
  const persp=1/(1+z2*0.16);
  return [W/2 + x*scale*persp, H*0.56 - y2*scale*persp, z2];
}

function heightColor(h){ // h signed [-1,1]
  if(h>=0){
    const t=Math.min(1,h);
    return mix([20,28,45],[245,181,61],t*0.92); // ground -> amber
  }else{
    const t=Math.min(1,-h);
    return mix([20,28,45],[139,108,240],t*0.92); // ground -> violet
  }
}
function mix(a,b,t){return [a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t]}
function rgb(c,a){return `rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a==null?1:a})`}

function draw(){
  ctx.clearRect(0,0,W,H);
  const d=DATA[tk], grid=d[surf], nT=d.times.length, nS=d.strikes.length;
  const M=norm(), hScale=0.62;
  const quads=[];
  const light=[0.4,0.8,0.45]; const ll=Math.hypot(...light);
  for(let ti=0;ti<nT-1;ti++){
    for(let si=0;si<nS-1;si++){
      const reveal = ti<=frame; // terrain ahead of playhead dimmed
      const pts=[[ti,si],[ti+1,si],[ti+1,si+1],[ti,si+1]].map(([a,b])=>{
        const gx=(a/(nT-1)-0.5)*2, gz=(b/(nS-1)-0.5)*2;
        const h=grid[a][b]/M*hScale;
        return {p:project(gx,h,gz), h:grid[a][b]/M};
      });
      const depth=(pts[0].p[2]+pts[1].p[2]+pts[2].p[2]+pts[3].p[2])/4;
      const hAvg=(pts[0].h+pts[1].h+pts[2].h+pts[3].h)/4;
      // simple normal for shading
      const v1=[pts[1].p[0]-pts[0].p[0],pts[1].p[1]-pts[0].p[1],0.001];
      const v2=[pts[3].p[0]-pts[0].p[0],pts[3].p[1]-pts[0].p[1],0.001];
      let shade=0.72+0.28*Math.abs(hAvg);
      quads.push({pts,depth,hAvg,reveal,shade});
    }
  }
  quads.sort((a,b)=>b.depth-a.depth);
  for(const q of quads){
    const c=heightColor(q.hAvg);
    const sc=q.reveal?q.shade:q.shade*0.4;
    ctx.beginPath();
    ctx.moveTo(q.pts[0].p[0],q.pts[0].p[1]);
    for(let i=1;i<4;i++)ctx.lineTo(q.pts[i].p[0],q.pts[i].p[1]);
    ctx.closePath();
    ctx.fillStyle=rgb([c[0]*sc,c[1]*sc,c[2]*sc], q.reveal?0.96:0.5);
    ctx.fill();
    ctx.strokeStyle=rgb([c[0],c[1],c[2]], q.reveal?0.14:0.05);
    ctx.lineWidth=0.5;ctx.stroke();
  }
  drawPricePath(d,grid,M,hScale);
}

function strikeToRow(price,d){
  const s=d.strikes; if(price<=s[0])return 0; if(price>=s[s.length-1])return s.length-1;
  for(let i=0;i<s.length-1;i++) if(price>=s[i]&&price<price+1&&price<=s[i+1]) return i+(price-s[i])/(s[i+1]-s[i]);
  return s.length/2;
}
function gammaAt(grid,ti,rowf){
  const r0=Math.floor(rowf),r1=Math.min(grid[ti].length-1,r0+1),f=rowf-r0;
  return grid[ti][r0]*(1-f)+grid[ti][r1]*f;
}
function pathPoint(d,grid,M,hScale,ti){
  // map full-res spot at this time index to a terrain point
  const t=d.times[ti];
  // find spot at nearest path time
  let sp=d.spot[0][1];
  for(const [mn,pv] of d.spot){ if(mn<=t) sp=pv; else break; }
  const rowf=strikeToRow(sp,d);
  const gx=(ti/(d.times.length-1)-0.5)*2, gz=(rowf/(d.strikes.length-1)-0.5)*2;
  const h=gammaAt(grid,ti,rowf)/M*hScale + 0.02;
  return {scr:project(gx,h,gz), sp, g:gammaAt(grid,ti,rowf)};
}

function drawPricePath(d,grid,M,hScale){
  const nT=d.times.length;
  // trail up to frame
  ctx.lineWidth=2.4;ctx.lineJoin='round';
  for(let ti=1;ti<=frame;ti++){
    const a=pathPoint(d,grid,M,hScale,ti-1).scr, b=pathPoint(d,grid,M,hScale,ti).scr;
    const fade=0.25+0.75*(ti/Math.max(1,frame));
    ctx.strokeStyle=rgb([63,228,255],fade*0.9);
    ctx.beginPath();ctx.moveTo(a[0],a[1]);ctx.lineTo(b[0],b[1]);ctx.stroke();
  }
  // marble at current frame
  const cur=pathPoint(d,grid,M,hScale,frame);
  const [x,y]=cur.scr;
  const grd=ctx.createRadialGradient(x,y,0,x,y,16);
  grd.addColorStop(0,'rgba(255,255,255,.95)');grd.addColorStop(.4,'rgba(63,228,255,.9)');grd.addColorStop(1,'rgba(63,228,255,0)');
  ctx.fillStyle=grd;ctx.beginPath();ctx.arc(x,y,16,0,7);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x,y,3.2,0,7);ctx.fill();
  updateReadout(d,cur);
}

function updateReadout(d,cur){
  const t=d.times[frame];
  const hh=String(Math.floor(t/60)).padStart(2,'0'), mm=String(t%60).padStart(2,'0');
  document.getElementById('r-time').textContent=`${hh}:${mm} ET`;
  document.getElementById('clock').textContent=`${hh}:${mm} ET`;
  document.getElementById('r-spot').textContent=cur.sp.toFixed(2);
  const chg=(cur.sp-d.open)/d.open*100;
  const ce=document.getElementById('r-chg');
  ce.textContent=(chg>=0?'+':'')+chg.toFixed(2)+'%';
  ce.style.color=chg>=0?'var(--amber-hi)':'var(--violet-hi)';
  const g=cur.g, M=norm(), rel=g/M;
  document.getElementById('r-node').textContent=(g>=0?'+':'')+(g/1e6).toFixed(0)+'M γ';
  const reg=document.getElementById('r-regime');
  if(rel>0.14){reg.innerHTML='<b style="color:var(--amber-hi)">PIKA MOUNTAIN</b> · price pinned';}
  else if(rel<-0.14){reg.innerHTML='<b style="color:var(--violet-hi)">BARNEY VALLEY</b> · price slides';}
  else{reg.innerHTML='<b style="color:var(--dim)">MIDPOINT</b> · low friction';}
}

// interaction
let drag=false,lx,ly;
cv.addEventListener('pointerdown',e=>{drag=true;lx=e.clientX;ly=e.clientY;cv.setPointerCapture(e.pointerId)});
cv.addEventListener('pointermove',e=>{if(!drag)return;yaw+=(e.clientX-lx)*0.008;pitch=Math.max(0.25,Math.min(1.45,pitch+(e.clientY-ly)*0.006));lx=e.clientX;ly=e.clientY;draw()});
cv.addEventListener('pointerup',e=>{drag=false});
cv.addEventListener('wheel',e=>{e.preventDefault();zoom=Math.max(0.55,Math.min(2.2,zoom-e.deltaY*0.0011));draw()},{passive:false});

const seek=document.getElementById('seek');
seek.addEventListener('input',()=>{frame=+seek.value;playing=false;document.getElementById('play').textContent='▶';draw()});
document.getElementById('play').addEventListener('click',function(){
  playing=!playing;this.textContent=playing?'❚❚':'▶';
  if(playing&&frame>=51)frame=0;
  if(playing)loop();
});
function loop(){
  if(!playing)return;
  frame++;if(frame>51){frame=51;playing=false;document.getElementById('play').textContent='▶';}
  seek.value=frame;draw();
  if(playing)setTimeout(()=>requestAnimationFrame(loop),95);
}
document.querySelectorAll('[data-t]').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('[data-t]').forEach(x=>x.setAttribute('aria-selected','false'));
  b.setAttribute('aria-selected','true');tk=b.dataset.t;draw();
}));
document.querySelectorAll('[data-s]').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('[data-s]').forEach(x=>x.setAttribute('aria-selected','false'));
  b.setAttribute('aria-selected','true');surf=b.dataset.s;draw();
}));
new MutationObserver(draw).observe(document.documentElement,{attributes:true,attributeFilter:['data-theme']});
resize();draw();
</script>
