services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: cfp_db
    environment:
      POSTGRES_USER: cfp
      POSTGRES_PASSWORD: cfp
      POSTGRES_DB: cfp
    ports:
      - "5432:5432"
    volumes:
      - cfp_db_data:/var/lib/postgresql/data
      - ./infra/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cfp -d cfp"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cfp_db_data:
